Variable.HOP_LINEAGE_ENABLED.Desc=Set to Y to enable the lineage hub (async dispatch of lineage events to registered sinks).
Variable.HOP_LINEAGE_QUEUE_CAPACITY.Desc=Maximum number of lineage events queued in memory before new events are dropped.
Variable.HOP_LINEAGE_BATCH_MAX.Desc=Maximum lineage events per batch delivered to sinks.
Variable.HOP_LINEAGE_BATCH_LINGER_MS.Desc=Maximum time in milliseconds to wait for more lineage events before dispatching a partial batch.
Variable.HOP_LINEAGE_SINK_IDS.Desc=Comma-separated lineage sink plugin ids to enable; leave empty to register all discovered sinks.
