Variable.HOP_LINEAGE_ENABLED.Desc=设为 Y 可启用谱系 hub（异步将谱系事件分发给已注册的 sink）。
Variable.HOP_LINEAGE_QUEUE_CAPACITY.Desc=在新事件被丢弃之前，内存中排队的谱系事件的最大数量。
Variable.HOP_LINEAGE_BATCH_MAX.Desc=每批次交付给 sink 的谱系事件的最大数量。
Variable.HOP_LINEAGE_BATCH_LINGER_MS.Desc=在分发部分批次之前，等待更多谱系事件的最大时间（毫秒）。
Variable.HOP_LINEAGE_SINK_IDS.Desc=以逗号分隔的要启用的谱系 sink 插件 ID；留空则注册所有已发现的 sink。
