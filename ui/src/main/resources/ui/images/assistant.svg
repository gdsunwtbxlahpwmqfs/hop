<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="assistantBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E3A5A"/>
      <stop offset="1" stop-color="#0A2B44"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#assistantBadge)" stroke="#ffffff" stroke-width="2"/>
  <!-- Robot head -->
  <rect x="18" y="22" width="28" height="22" rx="6" fill="#ffffff"/>
  <!-- Antenna -->
  <line x1="32" y1="14" x2="32" y2="22" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="13" r="3" fill="#fde047"/>
  <!-- Eyes -->
  <circle cx="26" cy="32" r="3.2" fill="#0E3A5A"/>
  <circle cx="38" cy="32" r="3.2" fill="#0E3A5A"/>
  <!-- Smile -->
  <path d="M25 38 Q32 43 39 38" fill="none" stroke="#0E3A5A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Stethoscope accent (doctor) -->
  <path d="M22 44 V48 Q22 52 26 52 Q30 52 30 48" fill="none" stroke="#5A7A92" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="30" cy="50" r="2.4" fill="#5A7A92"/>
</svg>
