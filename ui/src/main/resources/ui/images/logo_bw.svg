<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 512" width="768" height="512">
  <!-- White rounded rectangle background -->
  <rect x="0" y="0" width="768" height="512" rx="100" ry="100" fill="#FFFFFF"/>
  <!-- Magnifying glass - wide rounded rectangle lens -->
  <rect x="60" y="60" width="648" height="300" rx="70" ry="70"
        fill="none" stroke="#000000" stroke-width="28"/>
  <!-- Handle - short tail at bottom right -->
  <line x1="660" y1="345" x2="715" y2="400"
        stroke="#000000" stroke-width="28" stroke-linecap="round"/>
  <!-- i stem - straight -->
  <line x1="384" y1="185" x2="384" y2="290"
        stroke="#000000" stroke-width="24" stroke-linecap="round"/>
  <!-- i dot - slightly drooping head -->
  <ellipse cx="384" cy="148" rx="22" ry="20" fill="#000000"
           transform="rotate(-15, 384, 148)"/>
</svg>
