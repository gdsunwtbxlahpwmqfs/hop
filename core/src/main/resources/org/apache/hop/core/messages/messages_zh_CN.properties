Variable.HOP_ALLOW_UNSUPPORTED.Desc=设为 'Y' 可绕过引擎兼容性检查，运行包含被标记为在选定引擎上不支持的 transform 或 action 的 pipeline/workflow。仅对当前运行生效，不会持久化。
Variable.XML_ALLOW_DOCTYPE_DECL.Desc=该变量用于允许或禁止 XML 中的 doctype 声明
Variable.HOP_LOG_SIZE_LIMIT.Desc=所有未在各自属性中设置"log size limit"属性的 pipeline 和 workflow 的日志大小限制。
Variable.HOP_SERVER_DETECTION_TIMER.Desc=定义用于检测服务节点的定时器的变量名称
Variable.HOP_EMPTY_STRING_DIFFERS_FROM_NULL.Desc=NULL 与空字符串。如果设为 'Y'，空字符串和 null 被视为不同；否则相同
Variable.HOP_LENIENT_STRING_TO_NUMBER_CONVERSION.Desc=全局标志，用于允许为向后兼容而进行宽松的字符串转数字转换。如果设为 'Y'，以数字开头的字符串将成功转换为数字（例如：192.168.1.1 将根据小数点和分组符号转换为 192、192.168 或 192168）。默认值(N)为在字符串中发现非数字符号时抛出错误。
Variable.HOP_SYSTEM_HOSTNAME.Desc=可使用此变量加快主机名查找。Hop 执行主机名查找是为了能够记录执行 workflow 或 pipeline 的服务器。
Variable.HOP_MAX_LOG_SIZE_IN_LINES.Desc=Hop 内部保留的日志行的最大数量。设为 0 保留所有行（默认）
Variable.HOP_MAX_LOG_TIMEOUT_IN_MINUTES.Desc=Hop 内部保留的日志行的最大存留时间（分钟）。设为 0 无限期保留所有行（默认）
Variable.HOP_SERVER_OBJECT_TIMEOUT_MINUTES.Desc=此项目变量设置一个超时时间，超时后等待中、已完成或已停止的 pipeline 和 workflow 将被自动清理。默认值为 1440（一天）。
Variable.HOP_TRANSFORM_PERFORMANCE_SNAPSHOT_LIMIT.Desc=内存中保留的 transform 性能快照的最大数量。设为 0 无限期保留所有快照（默认）
Variable.HOP_METRIC_DATA_VOLUME.Desc=启用每个 transform 的数据量（输入字节）pipeline 指标。设为 Y 或 true 时，每个 transform 会跟踪输入端估计读取的字节数。
Variable.HOP_MAX_WORKFLOW_TRACKER_SIZE.Desc=要跟踪的 workflow tracker 子项的最大数量。默认值为 5000。
Variable.HOP_MAX_ACTIONS_LOGGED.Desc=为日志记录目的保留在内存中的 action 结果的最大数量。
Variable.HOP_MAX_LOGGING_REGISTRY_SIZE.Desc=为日志记录目的保留在内存中的日志注册表条目的最大数量。这是日志对象的数量，一个日志对象可以是 pipeline/workflow/transform/action 或几个系统级别的日志器。
Variable.HOP_LOG_TAB_REFRESH_DELAY.Desc=Hop 日志标签页刷新延迟。
Variable.HOP_LOG_TAB_REFRESH_PERIOD.Desc=Hop 日志标签页刷新周期。
Variable.HOP_PLUGIN_CLASSES.Desc=用于扫描插件注解的以逗号分隔的类列表
Variable.HOP_PIPELINE_ROWSET_SIZE.Desc=包含 pipeline rowset 大小的环境变量名称。这会覆盖您在 pipeline 设置中设置的值
Variable.HOP_PASSWORD_ENCODER_PLUGIN.Desc=按 ID 指定要使用的密码编码器插件（默认为 Hop）。
Variable.HOP_ROWSET_GET_TIMEOUT.Desc=可选地包含替代 rowset get 超时时间（毫秒）的变量名称。这仅对极短命的 pipeline 有影响。
Variable.HOP_ROWSET_PUT_TIMEOUT.Desc=可选地包含替代 rowset put 超时时间（毫秒）的变量名称。这仅对极短命的 pipeline 有影响。
Variable.HOP_BATCHING_ROWSET.Desc=设为 'Y' 可测试更高效的批处理 row set。
Variable.HOP_FILE_OUTPUT_MAX_STREAM_COUNT.Desc=此项目变量由 Text File Output transform 使用。它定义了该 transform 内同时打开的文件的最大数量。transform 将根据需要关闭/重新打开文件，以确保不超过最大值
Variable.HOP_FILE_OUTPUT_MAX_STREAM_LIFE.Desc=此项目变量由 Text File Output transform 使用。它定义了该 transform 打开的文件之间刷新的最大毫秒数。
Variable.HOP_DISABLE_CONSOLE_LOGGING.Desc=设为 'Y' 可禁用标准 Hop 控制台日志输出（stdout）。
Variable.HOP_DEFAULT_NUMBER_FORMAT.Desc=包含替代默认数字格式的变量名称
Variable.HOP_DEFAULT_BIGNUMBER_FORMAT.Desc=包含替代默认大数字格式的变量名称
Variable.HOP_DEFAULT_INTEGER_FORMAT.Desc=包含替代默认整数格式的变量名称
Variable.HOP_DEFAULT_DATE_FORMAT.Desc=包含替代默认日期格式的变量名称
Variable.HOP_AGGREGATION_MIN_NULL_IS_VALUED.Desc=设为 'Y' 可在聚合中包含 NULL 时将最小值设为 NULL。否则默认情况下 MIN 聚合会忽略 NULL，并将 MIN 设为非 NULL 的最小值。另请参阅变量 HOP_AGGREGATION_ALL_NULLS_ARE_ZERO。
Variable.HOP_AGGREGATION_ALL_NULLS_ARE_ZERO.Desc=设为 'Y' 可在聚合中所有值都为 NULL 时返回 0。否则默认情况下所有值为 NULL 时返回 NULL。
Variable.HOP_DEFAULT_TIMESTAMP_FORMAT.Desc=包含替代默认时间戳格式的变量名称
Variable.HOP_SPLIT_FIELDS_REMOVE_ENCLOSURE.Desc=设为 'N' 可在 Split fields transform 中分割字符串后保留封装符号。设为 true 将从结果字符串块中删除首尾的封装符号。
Variable.HOP_ALLOW_EMPTY_FIELD_NAMES_AND_TYPES.Desc=设为 'Y' 可允许您的 pipeline 传递 'null' 字段和/或空类型。
Variable.HOP_GLOBAL_LOG_VARIABLES_CLEAR_ON_EXPORT.Desc=设为 'N' 可保留在 pipeline/workflow 属性 -> 日志面板中定义的全局日志变量。设为 'Y' 将在导出 pipeline/workflow 时清除它们。
Variable.HOP_LOG_MARK_MAPPINGS.Desc=设为 'Y' 可在日志行中在 transform/action 名称前加上完整的 transform/action 路径。有助于精确识别问题发生在流程中的位置。
Variable.HOP_SERVER_JETTY_ACCEPTORS.Desc=为 Hop server 配置 jetty 选项：acceptors 的变量
Variable.HOP_SERVER_JETTY_ACCEPT_QUEUE_SIZE.Desc=为 Hop server 配置 jetty 选项：acceptQueueSize 的变量
Variable.HOP_SERVER_JETTY_RES_MAX_IDLE_TIME.Desc=为 Hop server 配置 jetty 选项：lowResourcesMaxIdleTime 的变量
Variable.HOP_DEFAULT_SERVLET_ENCODING.Desc=定义 servlet 的默认编码，留空则使用 Java 默认编码
Variable.HOP_SERVER_REFRESH_STATUS.Desc=配置 Hop server workflow/pipeline 状态页面刷新的变量
Variable.HOP_MAX_TAB_LENGTH.Desc=配置 Tab 大小的变量
Variable.HOP_ZIP_MIN_INFLATE_RATIO.Desc=配置解压缩前后字节之间最小允许比率以检测 zip 炸弹的变量
Variable.HOP_ZIP_MIN_INFLATE_RATIO_DEFAULT_STRING.Desc=HOP_ZIP_MIN_INFLATE_RATIO 的默认值（字符串形式）。
Variable.HOP_ZIP_MAX_ENTRY_SIZE.Desc=配置单个 zip 条目最大文件大小的变量
Variable.HOP_ZIP_MAX_ENTRY_SIZE_DEFAULT_STRING.Desc=HOP_ZIP_MAX_ENTRY_SIZE 的默认值（字符串形式）。
Variable.HOP_ZIP_MAX_TEXT_SIZE.Desc=配置从文档中提取文本时在抛出异常之前提取的最大字符数的变量
Variable.HOP_ZIP_MAX_TEXT_SIZE_DEFAULT_STRING.Desc=HOP_ZIP_MAX_TEXT_SIZE 的默认值（字符串形式）。
Variable.HOP_LICENSE_HEADER_FILE.Desc=设置后此变量应包含一个文件路径，该文件将被包含在 pipeline 和 workflow 的序列化中
Variable.HOP_JSON_INPUT_INCLUDE_NULLS.Desc=设置此变量以便在解析 JSON 文件时考虑 null 值。如果 HOP_JSON_INPUT_INCLUDE_NULLS 为 "Y" 则包含 null 值（默认行为），否则不包含
Variable.HOP_CONTEXT_DIALOG_STRICT_SEARCH.Desc=此变量影响上下文对话框中的搜索方式，设为 Y 时将进行严格搜索（用于自动化 UI 测试）
Variable.HOP_DEFAULT_BUFFER_POLLING_WAITTIME.Desc=transform 输入缓冲区的默认轮询频率（毫秒）
Variable.HOP_BINARY_FIELDS_AVOID_HEX_PREVIEW.Desc=在预览时显示二进制字段的原始内容，而非其十六进制值。
Variable.HOP_TABLE_VIEW_EXTRA_COLUMN_MARGIN.Desc=如果由于某种原因表格列有点太窄，您可以手动给它一点额外的宽度（像素）。
Variable.HOP_QUERY_PREVIEW_TIMEOUT.Desc=数据库查询预览的默认 JDBC 语句查询超时时间（秒，0 = 未设置）。
Variable.HOP_USE_NATIVE_FILE_DIALOG.Desc=设为 'Y' 可在浏览文件时使用系统文件打开/保存对话框。
Variable.HOP_LINEAGE_ENABLED.Desc=设为 Y 可启用血缘中心（异步将血缘事件分发到已注册的接收器）。
Variable.HOP_LINEAGE_QUEUE_CAPACITY.Desc=内存中排队的血缘事件最大数量，超过后新事件将被丢弃。
Variable.HOP_LINEAGE_BATCH_MAX.Desc=每批交付给接收器的最大血缘事件数。
Variable.HOP_LINEAGE_BATCH_LINGER_MS.Desc=在分发部分批次之前等待更多血缘事件的最大时间（毫秒）。
Variable.HOP_LINEAGE_SINK_IDS.Desc=要启用的血缘接收器插件 ID（逗号分隔）；留空则注册所有发现的接收器。
Variable.HOP_AUTO_SAVE_METADATA.Desc=设为 'Y' 可自动保存元数据更改而不提示。
Variable.HOP_METADATA_CACHE_TTL.Desc=元数据缓存条目的过期时间（秒），过期后将被刷新。
Variable.HOP_CLEANUP_TEMP_FILES_ON_EXIT.Desc=设为 'Y' 可在 JVM 关闭时清理临时文件（排序文件等）。
Variable.HOP_MAX_CONCURRENT_BACKGROUND_TASKS.Desc=并发后台任务的最大数量（例如元数据序列化、预览查询）。
Variable.HOP_USE_VIRTUAL_THREADS.Desc=设为 'Y' 可使用 JDK 21 虚拟线程执行 transform。需要 JDK 21+。
Variable.HOP_ROWSET_DEFAULT_SIZE.Desc=未在 pipeline 属性中显式设置时的默认 rowset 大小。覆盖内置默认值。
Variable.HOP_DEFAULT_SORT_SIZE.Desc=默认排序大小（行数），超过后会溢出到磁盘。
Variable.HOP_MEMORY_FREE_THRESHOLD_PERCENT.Desc=可用堆内存的最小百分比，低于此值时 pipeline 执行将暂停或中止。
Variable.HOP_AUTO_CLEAN_TEMP_SORT_FILES.Desc=设为 'Y' 可在排序操作完成后自动删除临时排序文件。
Variable.HOP_METRIC_FLUSH_INTERVAL_MS.Desc=pipeline 指标刷新到已注册接收器的间隔时间（毫秒）。
Variable.HOP_HIDE_DATABASE_PASSWORDS_IN_LOGS.Desc=设为 'Y' 可在日志输出中屏蔽数据库密码值。
Variable.HOP_DISABLE_PLAIN_TEXT_CREDENTIALS.Desc=设为 'Y' 可禁止以明文形式存储凭据；强制使用密码编码器。
Variable.HOP_MASK_SENSITIVE_OUTPUT.Desc=设为 'Y' 可在控制台和预览输出中屏蔽敏感信息（密码、令牌）。
Variable.HOP_SESSION_TIMEOUT_MINUTES.Desc=Hop Web (RAP) 部署的 Web 会话超时时间（分钟）。
Variable.HOP_LOG_FILE_MAX_SIZE_MB.Desc=日志文件轮转前的最大大小（MB）。
Variable.HOP_LOG_FILE_ROTATION_COUNT.Desc=要保留的轮转日志文件数量。
Variable.HOP_LOG_BUFFER_LINES.Desc=刷新到日志输出之前在内存中缓冲的日志行数。
Variable.HOP_DISABLE_SENSITIVE_DATA_LOGGING.Desc=设为 'Y' 可防止敏感数据（包含密码/令牌的行值）写入日志。
Variable.HOP_PREVIEW_BATCH_SIZE.Desc=预览模式下每个 transform 获取的默认行数。
Variable.NEO4J_LOGGING_CONNECTION.Desc=将此变量设置为现有 Neo4j 连接的名称，以启用向 Neo4j 数据库执行日志记录。
