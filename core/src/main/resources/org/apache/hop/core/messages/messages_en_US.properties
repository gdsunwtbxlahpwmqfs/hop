Variable.HOP_ALLOW_UNSUPPORTED.Desc=Set to 'Y' to bypass the engine-compatibility gate and run pipelines/workflows that contain transforms or actions marked UNSUPPORTED on the selected engine. Run-scoped, not persisted.
Variable.XML_ALLOW_DOCTYPE_DECL.Desc=A variable allow or disallow doctype declarations in XML
Variable.HOP_LOG_SIZE_LIMIT.Desc=The log size limit for all pipelines and workflows that don't have the "log size limit" property set in their respective properties.
Variable.HOP_SERVER_DETECTION_TIMER.Desc=The name of the variable that defines the timer used for detecting server nodes
Variable.HOP_EMPTY_STRING_DIFFERS_FROM_NULL.Desc=NULL vs Empty String. If this setting is set to 'Y', an empty string and null are different. Otherwise they are not
Variable.HOP_LENIENT_STRING_TO_NUMBER_CONVERSION.Desc=System wide flag to allow lenient string to number conversion for backward compatibility. If this setting is set to 'Y', an string starting with digits will be converted successfully into a number. (example: 192.168.1.1 will be converted into 192 or 192.168 or 192168 depending on the decimal and grouping symbol). The default (N) will be to throw an error if non-numeric symbols are found in the string.
Variable.HOP_SYSTEM_HOSTNAME.Desc=You can use this variable to speed up hostname lookup. Hostname lookup is performed by Hop so that it is capable of logging the server on which a workflow or pipeline is executed.
Variable.HOP_MAX_LOG_SIZE_IN_LINES.Desc=The maximum number of log lines that are kept internally by Hop. Set to 0 to keep all rows (default)
Variable.HOP_MAX_LOG_TIMEOUT_IN_MINUTES.Desc=The maximum age (in minutes) of a log line while being kept internally by Hop. Set to 0 to keep all rows indefinitely (default)
Variable.HOP_SERVER_OBJECT_TIMEOUT_MINUTES.Desc=This project variable will set a time-out after which waiting, completed or stopped pipelines and workflows will be automatically cleaned up. The default value is 1440 (one day).
Variable.HOP_TRANSFORM_PERFORMANCE_SNAPSHOT_LIMIT.Desc=The maximum number of transform performance snapshots to keep in memory. Set to 0 to keep all snapshots indefinitely (default)
Variable.HOP_METRIC_DATA_VOLUME.Desc=Enable pipeline metric for data volume (bytes in) per transform. When Y or true, each transform tracks estimated bytes read on input.
Variable.HOP_MAX_WORKFLOW_TRACKER_SIZE.Desc=The maximum number of workflow trackers childrens to keep track of. Default value is 5000.
Variable.HOP_MAX_ACTIONS_LOGGED.Desc=The maximum number of action results kept in memory for logging purposes.
Variable.HOP_MAX_LOGGING_REGISTRY_SIZE.Desc=The maximum number of logging registry entries kept in memory for logging purposes. This is the number of logging objects, a logging object can be a pipeline/workflow/transform/action or a couple of system-level loggers.
Variable.HOP_LOG_TAB_REFRESH_DELAY.Desc=The hop log tab refresh delay.
Variable.HOP_LOG_TAB_REFRESH_PERIOD.Desc=The hop log tab refresh period.
Variable.HOP_PLUGIN_CLASSES.Desc=A comma delimited list of classes to scan for plugin annotations
Variable.HOP_PIPELINE_ROWSET_SIZE.Desc=Name of the environment variable that contains the size of the pipeline rowset size. This overwrites values that you set pipeline settings
Variable.HOP_PASSWORD_ENCODER_PLUGIN.Desc=Specifies the password encoder plugin to use by ID (Hop is the default).
Variable.HOP_ROWSET_GET_TIMEOUT.Desc=The name of the variable that optionally contains an alternative rowset get timeout (in ms). This only makes a difference for extremely short lived pipelines.
Variable.HOP_ROWSET_PUT_TIMEOUT.Desc=The name of the variable that optionally contains an alternative rowset put timeout (in ms). This only makes a difference for extremely short lived pipelines.
Variable.HOP_BATCHING_ROWSET.Desc=Set this variable to 'Y' if you want to test a more efficient batching row set.
Variable.HOP_FILE_OUTPUT_MAX_STREAM_COUNT.Desc=This project variable is used by the Text File Output transform. It defines the max number of simultaneously open files within the transform. The transform will close/reopen files as necessary to insure the max is not exceeded
Variable.HOP_FILE_OUTPUT_MAX_STREAM_LIFE.Desc=This project variable is used by the Text File Output transform. It defines the max number of milliseconds between flushes of files opened by the transform.
Variable.HOP_DISABLE_CONSOLE_LOGGING.Desc=Set this variable to 'Y' to disable standard Hop logging to the console. (stdout)
Variable.HOP_DEFAULT_NUMBER_FORMAT.Desc=The name of the variable containing an alternative default number format
Variable.HOP_DEFAULT_BIGNUMBER_FORMAT.Desc=The name of the variable containing an alternative default bignumber format
Variable.HOP_DEFAULT_INTEGER_FORMAT.Desc=The name of the variable containing an alternative default integer format
Variable.HOP_DEFAULT_DATE_FORMAT.Desc=The name of the variable containing an alternative default date format
Variable.HOP_AGGREGATION_MIN_NULL_IS_VALUED.Desc=Set this variable to 'Y' to set the minimum to NULL if NULL is within an aggregate. Otherwise by default NULL is ignored by the MIN aggregate and MIN is set to the minimum value that is not NULL. See also the variable HOP_AGGREGATION_ALL_NULLS_ARE_ZERO.
Variable.HOP_AGGREGATION_ALL_NULLS_ARE_ZERO.Desc=Set this variable to 'Y' to return 0 when all values within an aggregate are NULL. Otherwise by default a NULL is returned when all values are NULL.
Variable.HOP_DEFAULT_TIMESTAMP_FORMAT.Desc=The name of the variable containing an alternative default timestamp format
Variable.HOP_SPLIT_FIELDS_REMOVE_ENCLOSURE.Desc=Set this variable to 'N' to preserve enclosure symbol after splitting the string in the Split fields transform. Changing it to true will remove first and last enclosure symbol from the resulting string chunks.
Variable.HOP_ALLOW_EMPTY_FIELD_NAMES_AND_TYPES.Desc=Set this variable to 'Y' to allow your pipeline to pass 'null' fields and/or empty types.
Variable.HOP_GLOBAL_LOG_VARIABLES_CLEAR_ON_EXPORT.Desc=Set this variable to 'N' to preserve global log variables defined in pipeline / workflow Properties -> Log panel. Changing it to 'Y' will clear it when export pipeline / workflow.
Variable.HOP_LOG_MARK_MAPPINGS.Desc=Set this variable to 'Y' to precede transform/action name in log lines with the complete path to the transform/action. Useful to perfectly identify where a problem happened in our process.
Variable.HOP_SERVER_JETTY_ACCEPTORS.Desc=A variable to configure jetty option: acceptors for Hop server
Variable.HOP_SERVER_JETTY_ACCEPT_QUEUE_SIZE.Desc=A variable to configure jetty option: acceptQueueSize for Hop server
Variable.HOP_SERVER_JETTY_RES_MAX_IDLE_TIME.Desc=A variable to configure jetty option: lowResourcesMaxIdleTime for Hop server
Variable.HOP_DEFAULT_SERVLET_ENCODING.Desc=Defines the default encoding for servlets, leave it empty to use Java default encoding
Variable.HOP_SERVER_REFRESH_STATUS.Desc=A variable to configure refresh for Hop server workflow/pipeline status page
Variable.HOP_MAX_TAB_LENGTH.Desc=A variable to configure Tab size
Variable.HOP_ZIP_MIN_INFLATE_RATIO.Desc=A variable to configure the minimum allowed ratio between de- and inflated bytes to detect a zipbomb
Variable.HOP_ZIP_MIN_INFLATE_RATIO_DEFAULT_STRING.Desc=The default value for HOP_ZIP_MIN_INFLATE_RATIO as a String.
Variable.HOP_ZIP_MAX_ENTRY_SIZE.Desc=A variable to configure the maximum file size of a single zip entry
Variable.HOP_ZIP_MAX_ENTRY_SIZE_DEFAULT_STRING.Desc=The default value for HOP_ZIP_MAX_ENTRY_SIZE as a String.
Variable.HOP_ZIP_MAX_TEXT_SIZE.Desc=A variable to configure the maximum number of characters of text that are extracted before an exception is thrown during extracting text from documents
Variable.HOP_ZIP_MAX_TEXT_SIZE_DEFAULT_STRING.Desc=The default value for HOP_ZIP_MAX_TEXT_SIZE as a String.
Variable.HOP_LICENSE_HEADER_FILE.Desc=This is the name of the variable which when set should contains the path to a file which will be included in the serialization of pipelines and workflows
Variable.HOP_JSON_INPUT_INCLUDE_NULLS.Desc=Name of the variable to set so that Nulls are considered while parsing JSON files. If HOP_JSON_INPUT_INCLUDE_NULLS is "Y" then nulls will be included (default behavior) otherwise they will not be included
Variable.HOP_CONTEXT_DIALOG_STRICT_SEARCH.Desc=This variable influences how the search is done in the context dialog, when set to Y it will do a strict search (Needed for automated UI testing)
Variable.HOP_DEFAULT_BUFFER_POLLING_WAITTIME.Desc=This is the default polling frequency for the transforms input buffer (in ms)
Variable.HOP_BINARY_FIELDS_AVOID_HEX_PREVIEW.Desc=Display the original content of binary fields during preview, not its hexadecimal value.
Variable.HOP_TABLE_VIEW_EXTRA_COLUMN_MARGIN.Desc=If for some reason the table columns are a bit too narrow, you can give it a bit of extra with manually. (in pixels)
Variable.HOP_QUERY_PREVIEW_TIMEOUT.Desc=Default JDBC statement query timeout in seconds for database query preview (0 = unset).
Variable.HOP_USE_NATIVE_FILE_DIALOG.Desc=Set this value to 'Y' if you want to use the system file open/save dialog when browsing files.
Variable.HOP_LINEAGE_ENABLED.Desc=Set to Y to enable the lineage hub (async dispatch of lineage events to registered sinks).
Variable.HOP_LINEAGE_QUEUE_CAPACITY.Desc=Maximum number of lineage events queued in memory before new events are dropped.
Variable.HOP_LINEAGE_BATCH_MAX.Desc=Maximum lineage events per batch delivered to sinks.
Variable.HOP_LINEAGE_BATCH_LINGER_MS.Desc=Maximum time in milliseconds to wait for more lineage events before dispatching a partial batch.
Variable.HOP_LINEAGE_SINK_IDS.Desc=Comma-separated lineage sink plugin ids to enable; leave empty to register all discovered sinks.
Variable.HOP_AUTO_SAVE_METADATA.Desc=Set to 'Y' to automatically save metadata changes without prompting.
Variable.HOP_METADATA_CACHE_TTL.Desc=Time-to-live in seconds for metadata cache entries before they are refreshed.
Variable.HOP_CLEANUP_TEMP_FILES_ON_EXIT.Desc=Set to 'Y' to clean up temporary files (sort files, etc.) when the JVM shuts down.
Variable.HOP_MAX_CONCURRENT_BACKGROUND_TASKS.Desc=Maximum number of concurrent background tasks (e.g. metadata serialization, preview queries).
Variable.HOP_USE_VIRTUAL_THREADS.Desc=Set to 'Y' to use JDK 21 virtual threads for transform execution. Requires JDK 21+.
Variable.HOP_ROWSET_DEFAULT_SIZE.Desc=Default rowset size when not explicitly set in pipeline properties. Overrides the built-in default.
Variable.HOP_DEFAULT_SORT_SIZE.Desc=Default sort size (number of rows) before spilling to disk.
Variable.HOP_MEMORY_FREE_THRESHOLD_PERCENT.Desc=Minimum percentage of free heap memory below which pipeline execution will be paused or aborted.
Variable.HOP_AUTO_CLEAN_TEMP_SORT_FILES.Desc=Set to 'Y' to automatically delete temporary sort files after a sort operation completes.
Variable.HOP_METRIC_FLUSH_INTERVAL_MS.Desc=Interval in milliseconds at which pipeline metrics are flushed to registered sinks.
Variable.HOP_HIDE_DATABASE_PASSWORDS_IN_LOGS.Desc=Set to 'Y' to mask database password values in log output.
Variable.HOP_DISABLE_PLAIN_TEXT_CREDENTIALS.Desc=Set to 'Y' to disallow storing credentials in plain text; forces use of the password encoder.
Variable.HOP_MASK_SENSITIVE_OUTPUT.Desc=Set to 'Y' to mask sensitive information (passwords, tokens) in console and preview output.
Variable.HOP_SESSION_TIMEOUT_MINUTES.Desc=Web session timeout in minutes for Hop Web (RAP) deployments.
Variable.HOP_LOG_FILE_MAX_SIZE_MB.Desc=Maximum log file size in MB before rotation occurs.
Variable.HOP_LOG_FILE_ROTATION_COUNT.Desc=Number of rotated log files to retain.
Variable.HOP_LOG_BUFFER_LINES.Desc=Number of log lines buffered in memory before flushing to the log output.
Variable.HOP_DISABLE_SENSITIVE_DATA_LOGGING.Desc=Set to 'Y' to prevent sensitive data (row values containing passwords/tokens) from being written to logs.
Variable.HOP_PREVIEW_BATCH_SIZE.Desc=The default number of rows to fetch in preview mode per transform.
Variable.NEO4J_LOGGING_CONNECTION.Desc=Set this variable to the name of an existing Neo4j connection to enable execution logging to a Neo4j database.
