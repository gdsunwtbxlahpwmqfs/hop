BeamEnginesFlink.OptionsAutoWatermarkInterval.Label=自动水印间隔
BeamEnginesFlink.OptionsAutoWatermarkInterval.ToolTip=自动水印的间隔(以毫秒为单位).
BeamEnginesFlink.OptionsCheckpointInterval.Label=检查点间隔
BeamEnginesFlink.OptionsCheckpointInterval.ToolTip=在运行的管道中触发检查点的间隔(毫秒).默认:无检查点.
BeamEnginesFlink.OptionsCheckpointMode.Label=检查点模式
BeamEnginesFlink.OptionsCheckpointMode.ToolTip=定义一致性保证的检查点模式.
BeamEnginesFlink.OptionsCheckpointTimeout.Label=检查点超时(毫秒)
BeamEnginesFlink.OptionsCheckpointTimeout.ToolTip=检查点在被丢弃前可花费的最长时间(毫秒)。
BeamEnginesFlink.OptionsDisableMetrics.Label=禁用指标
BeamEnginesFlink.OptionsDisableMetrics.ToolTip=在 Flink 运行器中禁用 Beam 指标
BeamEnginesFlink.OptionsExecutionModeForBatch.Label=批处理执行模式
BeamEnginesFlink.OptionsExecutionModeForBatch.ToolTip=批处理管道数据交换的 Flink 模式。如果管道被阻塞，请将其设置为 BATCH_FORCED，参见 https://issues.apache.org/jira/browse/FLINK-10672
BeamEnginesFlink.OptionsExternalizedCheckpointsEnabled.Label=禁用外部检查点
BeamEnginesFlink.OptionsExternalizedCheckpointsEnabled.ToolTip=启用或禁用外部检查点。与检查点间隔配合使用
BeamEnginesFlink.OptionsFailOnCheckpointErrors.Label=检查点出错时失败?
BeamEnginesFlink.OptionsFailOnCheckpointErrors.ToolTip=设置任务在检查点过程中遇到错误时的预期行为。如果设置为 true，任务将在检查点出错时失败。如果设置为 false，任务将仅拒绝检查点并继续运行。
BeamEnginesFlink.OptionsLatencyTrackingInterval.Label=延迟跟踪间隔
BeamEnginesFlink.OptionsLatencyTrackingInterval.ToolTip=从源向接收器发送延迟跟踪标记的间隔(毫秒)。间隔值 <= 0 时禁用此功能。
BeamEnginesFlink.OptionsMaster.Label=Flink 主节点
BeamEnginesFlink.OptionsMaster.ToolTip=应执行管道的 Flink 主节点地址。可以是 \"host:port\" 形式，或特殊值 [local]、[collection] 或 [auto] 之一。
BeamEnginesFlink.OptionsMaxBundleSize.Label=最大捆绑大小
BeamEnginesFlink.OptionsMaxBundleSize.ToolTip=捆绑中元素的最大数量。
BeamEnginesFlink.OptionsMaxBundleTimeMills.Label=最大捆绑时间(毫秒)
BeamEnginesFlink.OptionsMaxBundleTimeMills.ToolTip=最终确定捆绑前等待的最长时间(毫秒)。
BeamEnginesFlink.OptionsNumberOfRetries.Label=执行重试次数
BeamEnginesFlink.OptionsNumberOfRetries.ToolTip=设置失败任务重新执行的次数。值为零实际上禁用容错。值为 -1 表示应使用系统默认值(如配置中定义)。
BeamEnginesFlink.OptionsObjectReuse.Label=对象重用
BeamEnginesFlink.OptionsObjectReuse.ToolTip=设置重用对象的行为。
BeamEnginesFlink.OptionsParallelism.Label=并行度
BeamEnginesFlink.OptionsParallelism.ToolTip=将操作分发到工作器时使用的并行度。如果未设置并行度，则使用配置的 Flink 默认值，如果找不到则使用 1。
BeamEnginesFlink.OptionsPauseBetweenCheckpoints.Label=检查点之间的最小暂停
BeamEnginesFlink.OptionsPauseBetweenCheckpoints.ToolTip=触发下一个检查点前的最小暂停(毫秒)。
BeamEnginesFlink.OptionsRetainExternalizedCheckpointsOnCancellation.Label=取消时保留外部检查点
BeamEnginesFlink.OptionsRetainExternalizedCheckpointsOnCancellation.ToolTip=设置取消时外部检查点的行为。
BeamEnginesFlink.OptionsRetryDelay.Label=执行重试延迟(毫秒)
BeamEnginesFlink.OptionsRetryDelay.ToolTip=设置执行之间的延迟(毫秒)。值为 -1 表示应使用默认值。
BeamEnginesFlink.OptionsShutdownSourcesAfterIdleMs.Label=在最终水位线时关闭源
BeamEnginesFlink.OptionsShutdownSourcesAfterIdleMs.ToolTip=关闭已空闲配置毫秒时间的源。一旦源被关闭，就无法再进行检查点操作。一旦处理完所有输入，关闭源最终会导致管道关闭(=Flink 作业完成)。除非显式设置，否则启用检查点时默认为 Long.MAX_VALUE，禁用检查点时默认为 0。有关此问题的进展，请参见 https://issues.apache.org/jira/browse/FLINK-2491。
