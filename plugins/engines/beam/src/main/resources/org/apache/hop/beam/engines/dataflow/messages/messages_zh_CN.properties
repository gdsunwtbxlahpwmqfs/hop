BeamEnginesDataflow.OptionsAppName.Label=应用名称
BeamEnginesDataflow.OptionsAppName.ToolTip=正在执行的 Dataflow 作业的名称，显示在 Dataflow 的作业列表和作业详细信息中
BeamEnginesDataflow.OptionsAutoScalingAlgorithm.Label=自动扩展算法
BeamEnginesDataflow.OptionsAutoScalingAlgorithm.ToolTip=您数据流作业的自动扩展模式。\n可能的值为 THROUGHPUT_BASED 以启用自动扩展，或 NONE 以禁用。\n请参阅 https://cloud.google.com/dataflow/service/dataflow-service-desc#Autotuning \n以了解有关数据流托管服务中自动扩展的更多信息。
BeamEnginesDataflow.OptionsDiskSize.Label=磁盘大小( GB )
BeamEnginesDataflow.OptionsDiskSize.ToolTip=每个远程计算引擎工作实例上要使用的磁盘大小( GB).\n 如果设置，至少指定 30 GB，以便用于工作器启动映像和本地日志
BeamEnginesDataflow.OptionsMaxNumberOfWorkers.Label=workers的最大数量
BeamEnginesDataflow.OptionsMaxNumberOfWorkers.ToolTip=用于工作池的最大worker数量。此选项限制了工作池在作业生命周期内的大小，包括管道更新。如果未指定，Dataflow 服务将计算一个上限。
BeamEnginesDataflow.OptionsNetwork.Label=网络
BeamEnginesDataflow.OptionsNetwork.ToolTip=用于启动workers的 GCE 网络。有关更多信息，请参见参考文档 https://cloud.google.com/compute/docs/networking。默认由 Dataflow 服务决定.
BeamEnginesDataflow.OptionsNumberOfWorkers.Label=初始化workers数量
BeamEnginesDataflow.OptionsNumberOfWorkers.ToolTip=执行管道时要使用的初始 Google Compute Engine 实例数量. \n 此选项决定了 Dataflow 服务在作业开始时启动多少个workers 。
BeamEnginesDataflow.OptionsProjectID.Label=项目ID
BeamEnginesDataflow.OptionsProjectID.ToolTip=您 Google Cloud 项目的项目 ID
BeamEnginesDataflow.OptionsPublicIP.Label=使用公共 IP ?
BeamEnginesDataflow.OptionsPublicIP.ToolTip=指定工作池是否应使用公共 IP 地址启动。警告：此功能为实验性。您必须在允许列表中才能使用。
BeamEnginesDataflow.OptionsRegion.Label=区域
BeamEnginesDataflow.OptionsRegion.ToolTip=指定用于启动工作实例以运行管道的计算引擎区域。\n此选项用于在与用于部署、管理和监控作业的区域不同的位置运行工作者。\nworkerRegion 的区域可参考 https://cloud.google.com/dataflow/docs/concepts/regional-endpoints#autozone。\n\n注意：此选项不能与 workerZone 或 zone 一起使用。\n\n更多信息： https://cloud.google.com/dataflow/docs/concepts/regional-endpoints
BeamEnginesDataflow.OptionsServiceAccount.Label=服务账号
BeamEnginesDataflow.OptionsServiceAccount.ToolTip=使用特定服务账号运行作业，而不是使用默认的 GCE 机器人
BeamEnginesDataflow.OptionsServiceOptions.Label=Dataflow 服务选项
BeamEnginesDataflow.OptionsServiceOptions.ToolTip=以逗号分隔的服务选项列表。服务选项由用户设置并配置服务。这将服务端功能的可用性与 Apache Beam 发布周期解耦.
BeamEnginesDataflow.OptionsStagingLocation.Label=暂存位置
BeamEnginesDataflow.OptionsStagingLocation.ToolTip=用于暂存本地文件的 Cloud Storage 路径。  \n 必须是有效的 Cloud Storage URL，以 gs:// 开头
BeamEnginesDataflow.OptionsSubNetwork.Label=子网
BeamEnginesDataflow.OptionsSubNetwork.ToolTip=用于启动workers的 GCE 子网。有关更多信息，请参见参考文档 https://cloud.google.com/compute/docs/networking。默认由 Dataflow 服务决定.
BeamEnginesDataflow.OptionsWorkerDiskType.Label=Worker 磁盘类型
BeamEnginesDataflow.OptionsWorkerDiskType.ToolTip=要使用的持久磁盘类型，通过磁盘类型资源的完整 URL 指定。\n 有关更多信息，请参见： \n https://cloud.google.com/compute/docs/disks#pdspecs
BeamEnginesDataflow.OptionsWorkerMachineType.Label=Worker 机器类型
BeamEnginesDataflow.OptionsWorkerMachineType.ToolTip=Dataflow 在启动workers虚拟机时使用的计算引擎机器类型。\n您可以使用任何可用的计算引擎机器类型系列以及自定义机器类型。\n\n为了获得最佳效果，建议使用 n1 机器类型。\n共享核心机器类型，例如 f1 和 g1 系列workers，在 Dataflow 服务级别协议下不受支持。\n\n请注意，Dataflow 根据workers的 vCPU 数量和内存（GB）计费。\n计费与机器类型系列无关。\n有关机器类型的参考，请查看 https://cloud.google.com/compute/docs/machine-types。
BeamEnginesDataflow.OptionsZone.Label=区域
BeamEnginesDataflow.OptionsZone.ToolTip=指定用于启动worker实例以运行管道的计算引擎区域。\n此选项用于在,与用于部署、管理和监控作业的区域不同的位置运行worker。\n\n注意：此选项不能与 workerRegion 或 zone 一起使用。
