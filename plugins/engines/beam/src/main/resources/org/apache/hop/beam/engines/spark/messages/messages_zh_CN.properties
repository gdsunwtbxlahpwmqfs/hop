BeamEnginesSpark.OptionsAppName.Label=应用名称
BeamEnginesSpark.OptionsAppName.ToolTip=设置 Spark 应用程序名称
BeamEnginesSpark.OptionsBatchIntervalMillis.Label=流式处理:批处理间隔(毫秒)
BeamEnginesSpark.OptionsBatchIntervalMillis.ToolTip=Spark流处理的间隔(以毫秒为单位).
BeamEnginesSpark.OptionsBlobStorageAccount.Label=Azure Blob 存储帐户
BeamEnginesSpark.OptionsBlobStorageAccount.ToolTip=Azure Blob 存储帐户名称
BeamEnginesSpark.OptionsBlobStorageEndpoint.Label=Azure Blob 存储端点
BeamEnginesSpark.OptionsBlobStorageEndpoint.ToolTip=Azure Blob 存储端点格式 https://<STORAGE ACCOUNT>.blob.core.windows.net/
BeamEnginesSpark.OptionsBlobStorageKey.Label=Azure Blob 存储密钥
BeamEnginesSpark.OptionsBlobStorageKey.ToolTip=Azure Blob 存储密钥
BeamEnginesSpark.OptionsBundleSize.Label=捆绑大小
BeamEnginesSpark.OptionsBundleSize.ToolTip=如果设置，bundleSize 将用于拆分 BoundedSources，否则默认按 Spark defaultParallelism 拆分 BoundedSources。与 Spark dynamicAllocation 一起使用时最有效。
BeamEnginesSpark.OptionsCheckpointDir.Label=流式处理:检查点目录
BeamEnginesSpark.OptionsCheckpointDir.ToolTip=用于流式处理弹性的检查点目录，在批处理中忽略。为了持久性，需要可靠的文件系统，如 HDFS/S3/GS。
BeamEnginesSpark.OptionsCheckpointDurationMillis.Label=流式处理:检查点持续时间(毫秒)
BeamEnginesSpark.OptionsCheckpointDurationMillis.ToolTip=检查点的周期(毫秒)。如果未设置，Spark 将默认为 Max(slideDuration, Seconds(10))。此 PipelineOptions 默认值 (-1) 最终将使用所述的 Spark 默认值。
BeamEnginesSpark.OptionsEnableSparkMetricSinks.Label=启用指标接收器
BeamEnginesSpark.OptionsEnableSparkMetricSinks.ToolTip=启用/禁用将聚合器值发送到 Spark 的指标接收器
BeamEnginesSpark.OptionsMaster.Label=Spark 主节点
BeamEnginesSpark.OptionsMaster.ToolTip=要连接的 spark master 的 url(例如 spark://host:port, local[4])。
BeamEnginesSpark.OptionsMaxRecordsPerBatch.Label=流式处理:每批最大记录数
BeamEnginesSpark.OptionsMaxRecordsPerBatch.ToolTip=每个微批次的最大记录数。仅适用于流式源。
BeamEnginesSpark.OptionsMinReadTimeMillis.Label=流式处理:最小读取时间(毫秒)
BeamEnginesSpark.OptionsMinReadTimeMillis.ToolTip=每个微批次用于读取的最短时间。
BeamEnginesSpark.OptionsReadTimePercentage.Label=流式处理:读取时间百分比
BeamEnginesSpark.OptionsReadTimePercentage.ToolTip=一个介于 0-1 之间的值，用于描述专用于从 UnboundedSource 读取的微批次百分比。
