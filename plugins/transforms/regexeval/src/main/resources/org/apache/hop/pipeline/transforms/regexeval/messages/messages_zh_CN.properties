RegexEvalDialog.Unix.Label=Unix 行模式\:
RegexEvalDialog.Unix.Tooltip=在这个模式下,对于正则表达式的符号 ^ 和 $ 而言,只有 '\n' 被认为是换行符.\r\n该模式也可以使用内嵌的标记(?d) 来表示
