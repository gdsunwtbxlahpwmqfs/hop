RegexEvalDialog.Multiline.Label=启用多行模式\:
RegexEvalDialog.Multiline.Tooltip=在多行模式下,表达式符号 ^ 和 $ 只匹配换行符之后或之前的字符.\r\n在缺省情况下,这两个表达式符号只在所有输入字符的开始或结束处匹配.\r\n多行模式也可以通过在正则表达式中嵌入标记(?m)来生效.
