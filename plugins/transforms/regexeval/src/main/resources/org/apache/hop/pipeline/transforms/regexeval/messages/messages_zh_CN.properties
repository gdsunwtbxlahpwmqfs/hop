RegexEvalDialog.Comment.Label=在表达式中允许有空格和注释\:
RegexEvalDialog.Comment.Tooltip=在该模式下,空格被忽略,以 \# 号开始的嵌入的注释也被忽略直至行尾\r\n注释模式也可以使用内置的标志(?x)来实现
RegexEvalDialog.ContentTab.TabTitle=内容
RegexEvalDialog.DotAll.Label=点字符 (.)全部匹配模式\:
RegexEvalDialog.DotAll.Tooltip=指定正则表达式中的点字符 (.) 是否与换行符相匹配.\r\n在点字符 (.)全部匹配模式下,点字符 (.) 可以和换行符匹配.\r\n缺省情况下点字符 (.)不与换行符匹配.\r\n点字符 (.) 模式也可以使用内置的标记(?s)来实现.
