RegexEvalDialog.AllowCaptureGroups.Label=为每个捕获组(capture group)创建一个字段\:
RegexEvalDialog.AllowCaptureGroups.Tooltip=对正则表达式里的每个捕获组(capture group)都相应地创建一个新的字段
RegexEvalDialog.CanonEq.Label=正规分解(Canonical Decomposition)匹配\:
RegexEvalDialog.CanonEq.Tooltip=通过设置 CANON_EQ 参数,可以进行正规分解(canonical decompositions )匹配, 这样可以忽略 Unicode 编码的差异,\r\n 如果您确认使用的是 US ASCII 编码,或者要提高匹配效率,不要选则该选项.
RegexEvalDialog.CaseInsensitive.Label=忽略大小写\:
RegexEvalDialog.CaseInsensitive.Tooltip=通过设置 CASE_INSENSITIVE 参数,可以忽略大小写匹配.\r\n缺省情况下,忽略大小写只对 US-ASCII 编码的字符有作用,如果想对 Unicode 编码的字符忽略大小写匹配,还同时要设置 UNICODE_CASE 参数.\r\n忽略大小写匹配还可以通过正则表达式内置的标记(?\!)来实现.
