JsonNormalizeInput.name=JSON规范化输入
JsonNormalizeInput.description=读取JSON（文件或字段），使用JsonPath选择记录数组，将嵌套对象拆平到点号分隔的列路径，每个数组元素一行。当每个列都有自己的JsonPath时使用JSON输入；使用此转换器将相似记录的数组转换为宽行。
JsonNormalizeInputMeta.keyword=json,normalize,flatten,ndjson,path

JsonNormalizeInputDialog.DialogTitle=JSON规范化输入
JsonNormalizeInputDialog.RecordPath.Label=记录JsonPath
JsonNormalizeInputDialog.RecordPath.Tooltip=JsonPath计算到要拆平的记录数组（例如$.items[*]或$.store.book[*]）。
JsonNormalizeInputDialog.FieldSeparator.Label=字段分隔符
JsonNormalizeInputDialog.MaxFlattenDepth.Label=最大拆平深度（-1=无限制）
JsonNormalizeInputDialog.ArrayHandling.Label=数组处理
JsonNormalizeInputDialog.BeyondDepth.Label=超出最大深度
JsonNormalizeInputDialog.IgnoreMissingField.Label=忽略缺失的字段路径
JsonNormalizeInputDialog.IgnoreMissingField.Tooltip=如果记录中不存在配置的字段路径，输出空值而不是失败。
JsonNormalizeInputDialog.GetFields.Error=无法从示例JSON推断字段。

JsonNormalizeInputMeta.CheckResult.NoInputField=至少需要一个输出字段。
JsonNormalizeInputMeta.CheckResult.NoRecordPath=需要记录JsonPath（例如$或$.items）。

JsonNormalizeInput.ErrorInTransformRunning=JSON规范化输入运行错误\: {0}
JsonNormalizeInput.Error.MissingPath=记录中缺少必需的拆平路径''{0}''。