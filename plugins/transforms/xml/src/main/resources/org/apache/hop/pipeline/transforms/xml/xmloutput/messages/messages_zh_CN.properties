XMLOutput.Injection.ENCODING=指定XML文件的编码类型。
XMLOutput.Injection.EXTENSION=此选项将.xml扩展名添加到文件名。
XMLOutput.Injection.FILENAME=XML文件的名称。
XMLOutput.Injection.INC_DATE_IN_FILENAME=启用此选项以在文件名中包含系统日期。
XMLOutput.Injection.INC_TIME_IN_FILENAME=启用此选项以在文件名中包含系统时间。
XMLOutput.Injection.INC_TRANSFORMNR_IN_FILENAME=启用此选项以在输出文件名中包含转换编号。
XMLOutput.Injection.MAIN_ELEMENT=XML文档中根元素的名称。
XMLOutput.Injection.NAMESPACE=指定XML文件的命名空间。
XMLOutput.Injection.OMIT_NULL_VALUES=如果要忽略XML输出中的空值, 请启用此选项。
XMLOutput.Injection.OUTPUT_CONTENT_TYPE=指定XML字段是元素还是属性。
XMLOutput.Injection.OUTPUT_CURRENCY=输入表示货币的符号, 例如 $、€ 或 ¥。
XMLOutput.Injection.OUTPUT_DECIMAL=输入表示小数的符号, 例如句点(.)或逗号(,)。
XMLOutput.Injection.OUTPUT_ELEMENTNAME=XML文件中使用的元素名称。
XMLOutput.Injection.OUTPUT_FIELDNAME=字段名称。
XMLOutput.Injection.OUTPUT_FIELDS=将要写入XML文件的输出字段名称。
XMLOutput.Injection.OUTPUT_FORMAT=指定所使用的XML类型的格式。
XMLOutput.Injection.OUTPUT_GROUP=输入表示分组的符号, 例如句点(.)或逗号(,)。
XMLOutput.Injection.OUTPUT_LENGTH=指定所用字段类型的长度。
XMLOutput.Injection.OUTPUT_NULL=指定当值为空时插入到文本文件中的字符串。
XMLOutput.Injection.OUTPUT_PRECISION=指定小数点后使用的位数。
XMLOutput.Injection.OUTPUT_TYPE=用于转换字段的格式掩码。可以是字符串、日期、布尔值、整数、大数、二进制、时间戳、网络地址。
XMLOutput.Injection.REPEAT_ELEMENT=XML文档中使用的行元素名称。
XMLOutput.Injection.SPEFICY_FORMAT=启用此选项以指定日期时间格式。
XMLOutput.Injection.SPLIT_EVERY=放入单个XML文件中的最大数据量, 超过后将创建新文件。
XMLOutput.Injection.ZIPPED=如果要将XML文件存储在zip归档中, 请启用此选项。