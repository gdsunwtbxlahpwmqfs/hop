AdvancedXMLOutput.name=XML输出（高级）
AdvancedXMLOutput.description=使用层次化XML树将行写入XML文件，支持可选的行循环和分组元素。
AdvancedXMLOutput.category=输出
AdvancedXmlOutputMeta.keyword=xml,输出,写入,树,层次化,高级

AdvancedXMLOutput.Injection.FILENAME=XML文件的基本名称。
AdvancedXMLOutput.Injection.OPERATION=输出目的地：写入文件、仅XML作为字段或两者都做（代码：writetofile, outputvalue, both）。
AdvancedXMLOutput.Injection.INCLUDE_INPUT_FIELDS_IN_OUTPUT=当为true时，输出行包含所有输入字段及生成的XML字段；当为false时，仅输出XML字段。
AdvancedXMLOutput.Injection.EXTENSION=追加到文件名后的扩展名（无前缀点）。
AdvancedXMLOutput.Injection.SPLIT_EVERY=分割前每个文件最大行数（0=不分割）。
AdvancedXMLOutput.Injection.INC_TRANSFORMNR_IN_FILENAME=将转换器复制数添加到文件名。
AdvancedXMLOutput.Injection.INC_DATE_IN_FILENAME=将系统日期（yyyyMMdd）添加到文件名。
AdvancedXMLOutput.Injection.INC_TIME_IN_FILENAME=将系统时间（HHmmss）添加到文件名。
AdvancedXMLOutput.Injection.ZIPPED=将输出文件包装在zip压缩文件中。
AdvancedXMLOutput.Injection.ADD_TO_RESULT=将生成的文件名添加到管道结果文件列表。
AdvancedXMLOutput.Injection.DO_NOT_CREATE_FILE_AT_STARTUP=延迟文件创建直到收到第一行。
AdvancedXMLOutput.Injection.DO_NOT_CREATE_EMPTY_FILE=如果没有写入任何行，在运行结束时删除文件。
AdvancedXMLOutput.Injection.SPEFICY_FORMAT=使用以下自定义日期/时间格式而不是日期/时间标志。
AdvancedXMLOutput.Injection.DATE_FORMAT=文件名的自定义日期/时间格式。
AdvancedXMLOutput.Injection.ENCODING=输出字符编码（默认UTF-8）。
AdvancedXMLOutput.Injection.COMPACT_FILE=取消元素之间的空白和行结束符。
AdvancedXMLOutput.Injection.BLANK_LINE_AFTER_XML_DECL=在XML声明后立即添加空行。
AdvancedXMLOutput.Injection.CREATE_ATTR_IF_NULL=输出源值为null的属性。
AdvancedXMLOutput.Injection.CREATE_ATTR_IF_UNMAPPED=输出没有映射字段的属性（使用默认值）。
AdvancedXMLOutput.Injection.CREATE_EMPTY_ELEMENT=为没有值的元素输出空的开始/结束标签。
AdvancedXMLOutput.Injection.TRIM_VALUES=从输出值中删除前后空白符。
AdvancedXMLOutput.Injection.DEFAULT_DECIMAL_SEPARATOR=数值的默认小数分隔符（每个节点仍然优先）。
AdvancedXMLOutput.Injection.DEFAULT_GROUPING_SEPARATOR=数值的默认分组分隔符（每个节点仍然优先）。
AdvancedXMLOutput.Injection.GENERATE_XSD=在输出XML附近生成同籍.xsd文件。
AdvancedXMLOutput.Injection.DOCTYPE_ROOT=DOCTYPE声明的根元素名称。
AdvancedXMLOutput.Injection.DOCTYPE_SYSTEM=DOCTYPE声明的系统标识符。
AdvancedXMLOutput.Injection.DOCTYPE_PUBLIC=DOCTYPE声明的公共标识符。
AdvancedXMLOutput.Injection.XSL_HREF=通过xml-stylesheetPI引用的XSL样式表URL。
AdvancedXMLOutput.Injection.XSL_TYPE=XSL样式表PI的MIME类型（默认text/xsl）。

AdvancedXMLOutputMeta.CheckResult.TreeOk=XML树结构正确。
AdvancedXMLOutputMeta.CheckResult.ExpectedInputOk=转换器连接到前一个转换器接收行。
AdvancedXMLOutputMeta.CheckResult.ExpectedInputError=未从前一个转换器接收输入。
AdvancedXMLOutputMeta.CheckResult.OutputXmlFieldMissing=输出模式需要设置XML结果字段名称。
AdvancedXMLOutputMeta.CheckResult.FilenameMissing=写入文件模式需要目标文件名。
AdvancedXMLOutputMeta.CheckResult.ZipNeedsFile=压缩输出需要写入文件（不能仅输出到字段）。

AdvancedXmlOutput.Error.MissingOutputXmlField=使用输出到字段或两者都使用时，请设置输出XML字段名称。
AdvancedXmlOutput.Error.ZipRequiresFile=压缩输出仅在写入文件时支持。
AdvancedXmlOutput.Error.MissingTargetFilename=将XML写入文件时，请设置文件名。
AdvancedXmlOutput.Error.OpenOutputFailed=无法打开XML输出（文件或内存缓冲区）。

