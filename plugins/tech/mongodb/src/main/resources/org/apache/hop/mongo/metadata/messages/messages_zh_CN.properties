MongoDbConnection.description=描述 MongoDB 连接
MongoDbConnection.name=MongoDB 连接
MongoDbConnectionEditor.GetDatabases.Button=获取数据库
MongoDbConnectionEditor.Name.Label=MongoDB 连接名
MongoDbConnectionEditor.Test.Button=测试
MongoDbConnectionEditor.Test.Success.Title=成功!
MongoMetadata.AppName.Label=应用程序名称
MongoMetadata.AppName.ToolTip=连接到 Atlas 时的应用程序名称
MongoMetadata.AuthDatabaseName.Label=身份验证数据库
MongoMetadata.AuthDatabaseName.ToolTip=要进行认证的MongoDB数据库
MongoMetadata.AuthenticationMechanism.Label=认证机制
MongoMetadata.AuthenticationMechanism.ToolTip=使用的认证机制
MongoMetadata.ConnectionString.Label=连接字符串
MongoMetadata.ConnectionString.ToolTip=完整的 MongoDB 连接字符串（例如 mongodb+srv://user:pass@cluster.mongodb.net/dbname）。提供时，此值优先于主机名/端口设置。
MongoMetadata.ConnectionTimeoutMs.Label=连接超时(ms)
MongoMetadata.ConnectionTimeoutMs.ToolTip=指定连接超时时间（毫秒）。留空以使用默认值。
MongoMetadata.ConnectionType.Label=连接类型
MongoMetadata.ConnectionType.ToolTip=选择连接类型: STANDARD (mongodb://) 或 SRV (mongodb+srv://)。SRV 连接用于 MongoDB Atlas，自动使用 SSL。
MongoMetadata.DbName.Label=数据库名称
MongoMetadata.DbName.ToolTip=要使用的 MongoDB 数据库名称
MongoMetadata.Hostname.Label=主机名
MongoMetadata.Hostname.ToolTip=指定您的 MongoDB 服务器的主机名
MongoMetadata.Journaled.Label=是否日志?
MongoMetadata.Journaled.ToolTip=选中后，写操作将等待 MongoDB 确认并将数据提交到磁盘上的日志
MongoMetadata.Password.Label=密码
MongoMetadata.Password.ToolTip=用于认证的密码
MongoMetadata.Port.Label=端口
MongoMetadata.Port.ToolTip=MongoDB 服务器的默认端口是 27017
MongoMetadata.ReadPreference.Label=读取偏好
MongoMetadata.ReadPreference.ToolTip=选择读取偏好: primary、primaryPreferred、secondary、secondaryPreferred、nearest
MongoMetadata.ReadPrefTagSets.Label=指定读取偏好标签集
MongoMetadata.ReadPrefTagSets.ToolTip=与读取偏好设置一起使用的可选标签集（JSON 字符串）。请参阅 MongoDB 文档中的 "副本集标签集"
MongoMetadata.ReplicaTimeoutMs.Label=复制超时(ms)
MongoMetadata.ReplicaTimeoutMs.ToolTip=等待复制成功的超时时间（毫秒），如 w 选项中所指定
MongoMetadata.SocketTimeoutMs.Label=Socket 超时(ms)
MongoMetadata.SocketTimeoutMs.ToolTip=指定 Socket 超时时间（毫秒）。留空以使用默认值。
MongoMetadata.UseAllReplicaSetMembers.Label=使用所有副本集成员?
MongoMetadata.UseAllReplicaSetMembers.ToolTip=选中此选项以发现并使用所有副本集成员（如果未在主机字段中指定）
MongoMetadata.UseSslSocketFactory.Label=使用 SSL socket 工厂?
MongoMetadata.UseSslSocketFactory.ToolTip=如果您想使用 SSL socket 工厂，请勾选此选项
MongoMetadata.Username.Label=用户名
MongoMetadata.Username.ToolTip=用于认证的用户名
MongoMetadata.WriteConcern.Label=写入关注
MongoMetadata.WriteConcern.ToolTip=默认 = 1（独立或主节点确认写入）; -1 无确认且抑制所有错误; 0 无确认但传递 socket/网络错误; "majority" 在多数副本集成员确认后返回; n (>1) 在 n 个副本集成员确认后返回; tags (字符串) 需要具有指定标签的副本集成员确认
MongoMetadata.useKerberos.Label=使用 Kerberos?
MongoMetadata.useKerberos.ToolTip=如果您想使用 Kerberos 进行认证，请勾选此选项
