<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- HFXT emblem: T-Rex (open jaws + enlarged two-claw forelimb) on amber badge. -->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <radialGradient id="amber" cx="50%" cy="38%" r="72%">
            <stop offset="0%" stop-color="#F9CB76"/>
            <stop offset="58%" stop-color="#F0AD44"/>
            <stop offset="100%" stop-color="#E2952F"/>
        </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#amber)"/>
    <g transform="translate(47,50) scale(0.9) translate(-50.5,-47)" fill="#0E3D5C">
        <!-- body + upper jaw (mouth opening is negative space) -->
        <path d="M 10 36
                 C 20 32 28 34 34 38
                 C 40 40 44 36 48 34
                 C 52 32 55 30 58 30
                 C 62 28 64 24 66 20
                 C 70 16 72 14 76 16
                 C 80 17 86 19 91 22
                 C 86 26 81 29 76 30
                 C 74 32 72 35 70 38
                 C 68 40 66 42 64 44
                 C 62 48 60 51 58 54
                 C 56 60 55 63 54 66
                 L 56 78
                 L 62 80
                 L 58 80
                 L 52 78
                 C 50 74 49 71 48 68
                 C 46 64 45 60 44 56
                 C 42 54 41 54 40 54
                 C 36 52 32 50 28 48
                 C 22 44 16 40 10 36 Z"/>
        <!-- lower jaw (separate, leaves open mouth gap) -->
        <path d="M 76 30
                 C 81 32 86 34 90 37
                 C 84 38 77 39 70 39 Z"/>
        <!-- enlarged two-claw forelimb -->
        <path d="M 60 45
                 L 64 46
                 L 67 54
                 L 71 61
                 L 69 62
                 L 66 56
                 L 64 61
                 L 62 60
                 L 63 53
                 L 59 49 Z"/>
        <!-- upper teeth (point down) -->
        <path d="M 86 23.5 L 88 23.5 L 87 26.5 Z
                 M 82 25.7 L 84 25.7 L 83 28.7 Z
                 M 78 27.8 L 80 27.8 L 79 30.8 Z" fill="#FFFFFF"/>
        <!-- lower teeth (point up) -->
        <path d="M 79 33 L 81 33 L 80 30 Z
                 M 83 35 L 85 35 L 84 32 Z
                 M 87 36.5 L 89 36.5 L 88 33.5 Z" fill="#FFFFFF"/>
        <!-- eye -->
        <circle cx="74" cy="20" r="2.2" fill="#FFFFFF"/>
    </g>
</svg>
