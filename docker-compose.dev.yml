services:
  hop-web:
    image: tomcat:10-jdk21
    # platform: linux/amd64
    platform: linux/arm64
    container_name: hop-web-dev
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      HOP_LOG_LEVEL: Debug
      HOP_AUDIT_FOLDER: /opt/hop/audit
      HOP_CONFIG_FOLDER: /opt/hop/config
      HOP_PLUGIN_BASE_FOLDERS: /opt/hop/plugins
      HOP_PASSWORD_ENCODER_PLUGIN: Hop
      HOP_SHARED_JDBC_FOLDERS: /opt/hop/jdbc
      # LLM personal assistant.
      # Requests go through the litellm proxy (service below) which speaks the
      # OpenAI format and routes to the real provider (DeepSeek, OpenAI, ...).
      HOP_LLM_ENABLED: "true"
      HOP_LLM_API_URL: "http://litellm:4000/v1"
      HOP_LLM_API_KEY: "sk-hop-litellm-dev"
      HOP_LLM_MODEL: "deepseek-flash"
      HOP_OPTIONS: -Dorg.eclipse.rap.rwt.resourceLocation=/tmp/rwt-resources -Dswt.use.gtk3=false -Duser.timezone=Asia/Shanghai
      CATALINA_OPTS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -Dorg.eclipse.rap.rwt.resourceLocation=/tmp/rwt-resources -DHOP_AUDIT_FOLDER=/opt/hop/audit -DHOP_CONFIG_FOLDER=/opt/hop/config -DHOP_LOG_LEVEL=Debug -DHOP_PASSWORD_ENCODER_PLUGIN=Hop -DHOP_PLUGIN_BASE_FOLDERS=/opt/hop/plugins -DHOP_SHARED_JDBC_FOLDERS=/opt/hop/jdbc -Dswt.use.gtk3=false -Duser.timezone=Asia/Shanghai
    volumes:
      - ./assemblies/web/target/webapp:/usr/local/tomcat/webapps/ROOT
      - ./assemblies/web/target/webapp/config:/opt/hop/config
      - ./assemblies/client/target/hop/plugins:/opt/hop/plugins
      - ./resources/jdbc-drivers:/opt/hop/jdbc
    depends_on:
      - litellm
    working_dir: /usr/local/tomcat
    command: >
      bash -c "
        mkdir -p /opt/hop/audit &&
        catalina.sh run
      "

  # LiteLLM proxy: unified OpenAI-compatible gateway in front of the real LLM
  # providers (DeepSeek, OpenAI, Anthropic, ...). Hop's assistant always calls
  # this proxy; the proxy translates to each provider's native format.
  # Provider API keys are injected here and referenced by name in
  # docker/resources/litellm-config.yaml.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: hop-litellm-dev
    ports:
      - "4000:4000"
    environment:
      # Real provider keys (do NOT commit real values; override via .env/shell).
      # DEEPSEEK_API_KEY is read by litellm-config.yaml via os.environ/.
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
    volumes:
      - ./docker/resources/litellm-config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
